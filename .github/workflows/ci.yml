name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vitruspm
          POSTGRES_PASSWORD: vitruspm123
          POSTGRES_DB: whatxpress
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci
      - run: npm run lint:check
      - run: npm run test:ci
        env:
          DATABASE_URL: postgresql://vitruspm:vitruspm123@localhost:5432/whatxpress
          JWT_SECRET: ci_test_secret_key
          SMTP_HOST: localhost
          SMTP_PORT: 587
          SMTP_USER: test
          SMTP_PASS: test

      - run: npm run build
        env:
          DATABASE_URL: postgresql://vitruspm:vitruspm123@localhost:5432/whatxpress
          JWT_SECRET: ci_test_secret_key
