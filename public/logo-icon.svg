<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>

    <!-- Emerald Green Gradient (WhatsApp & Order Core) -->
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="50%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>

    <!-- Electric Magenta Gradient (AI & Speed Xpress) -->
    <linearGradient id="magentaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F472B6"/>
      <stop offset="40%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#D946EF"/>
    </linearGradient>

    <!-- Outer Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Shadow Filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Premium Dark Backdrop with Smooth Rounded Corners -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)"/>
  
  <!-- Outer Decorative Ring / Orbit (AI Space) -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#magentaGrad)" stroke-width="4" stroke-opacity="0.2" stroke-dasharray="15 10"/>
  <circle cx="256" cy="256" r="190" fill="none" stroke="url(#emeraldGrad)" stroke-width="2" stroke-opacity="0.15"/>

  <!-- Logo Group with Drop Shadow -->
  <g filter="url(#shadow)">
    <!-- WhatsApp Chat Bubble Base (Emerald Green) -->
    <path d="M 150 240 
             C 150 160, 230 110, 310 110 
             C 390 110, 410 160, 410 220 
             C 410 290, 340 330, 270 330 
             C 255 330, 240 327, 225 322 
             L 165 352 
             L 177 302 
             C 160 285, 150 263, 150 240 Z" 
          fill="url(#emeraldGrad)"/>

    <!-- Inside Dynamic Lightning Slice (AI & Speed - Electric Magenta) -->
    <path d="M 285 100 
             L 190 265 
             L 265 265 
             L 225 385 
             L 340 215 
             L 265 215 Z" 
          fill="url(#magentaGrad)" 
          filter="url(#glow)"/>

    <!-- Overlay Speed Shard for dynamic contrast -->
    <path d="M 265 215 
             L 340 215 
             L 290 290 Z" 
          fill="#FFFFFF" 
          opacity="0.4"/>
  </g>

  <!-- Glowing Micro AI Nodes -->
  <circle cx="340" cy="215" r="8" fill="#FFFFFF" filter="url(#glow)"/>
  <circle cx="190" cy="265" r="6" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="225" cy="385" r="5" fill="url(#magentaGrad)"/>
</svg>
